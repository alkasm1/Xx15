<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Protocol v3 - Production Level</title>

<style>
body{
font-family: Arial;
background:#0d1117;
color:white;
margin:0;
padding:0;
}
.container{
max-width:900px;
margin:40px auto;
padding:20px;
background:#161b22;
border-radius:12px;
}
textarea,input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
background:#0d1117;
color:white;
border:1px solid #333;
}
button{
margin-top:10px;
padding:10px;
background:#238636;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}
.output{
margin-top:10px;
padding:10px;
border:1px dashed #444;
white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="container">

<h2>Protocol v3 (Production Level)</h2>

<input id="key" type="number" value="12345">

<textarea id="input"></textarea>
<button onclick="encode()">Encode</button>

<div class="output" id="out1"></div>

<hr>

<textarea id="inputFreq"></textarea>
<button onclick="decode()">Decode</button>

<div class="output" id="out2"></div>

</div>

<script>

// ================= CONFIG =================
const END = 999999999n;

// ================= SIMPLE DICTIONARY =================
let dictionary = {};
let reverseDict = {};
let dictCounter = 1n;

// تحويل كلمة إلى ID
function getWordId(word){
if(dictionary[word] !== undefined) return BigInt(dictionary[word]);

dictionary[word] = Number(dictCounter);
reverseDict[Number(dictCounter)] = word;
dictCounter++;
return dictCounter - 1n;
}

// ================= CRC16 =================
function crc16(n){
return (n ^ 0xA5A5n) % 65535n;
}

// ================= ENCODE =================
function encode(){

const key = BigInt(document.getElementById("key").value || 0);

const text = document.getElementById("input").value.trim();
const words = text.split(/\s+/);

let stream = [];
let seq = 1n;

for(let w of words){

if(!w) continue;

let id = getWordId(w);

// packet structure
let data = (seq * 100000n) + id;
let enc = data ^ key;
let crc = crc16(enc + seq);

// final packet
let packet = (seq * 100000000n) + (enc * 1000n) + crc;

stream.push(packet);

seq++;
}

stream.push(END);

document.getElementById("out1").textContent =
stream.map(x=>x.toString()).join("\n");
}

// ================= DECODE =================
function decode(){

const key = BigInt(document.getElementById("key").value || 0);
const lines = document.getElementById("inputFreq").value.trim().split("\n");

let result = [];

for(let l of lines){

let p = BigInt(l);
if(p === END) break;

// unpack
let crc = p % 1000n;
let enc = (p / 1000n) % 100000n;
let seq = p / 100000000n;

// verify
let check = (enc + seq) ^ key;
let calc = crc16(check + seq);

if(calc !== crc) continue;

let data = enc ^ key;
let id = data % 100000n;

result.push(reverseDict[Number(id)] || "?");
}

document.getElementById("out2").textContent =
result.join(" ");
}

</script>

</body>
</html>
