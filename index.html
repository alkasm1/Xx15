<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ALM GeoFreq v5</title>

<style>
body {
  font-family: "Cairo", sans-serif;
  background: #ffffff;
  color: #222;
  margin: 0;
}
header {
  background: #0BA37F;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}
.container {
  padding: 20px;
  max-width: 900px;
  margin: auto;
}
button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  background: #0BA37F;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 17px;
  cursor: pointer;
}
textarea, input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
}
#outputText {
  margin-top: 15px;
  padding: 10px;
  border: 1px solid #ccc;
  min-height: 120px;
  white-space: pre-wrap;
}
</style>
</head>

<body>

<header>ALM GeoFreq v5</header>

<div class="container">

<input id="userKey" value="123456789">

<textarea id="inputText" rows="6"></textarea>

<button onclick="encode()">تحويل إلى صورة</button>

<canvas id="canvas"></canvas>

<button onclick="saveImage()">💾 حفظ الصورة (PNG)</button>
<button onclick="saveAsDocument()">📄 حفظ كـ Document (للواتساب)</button>

<hr>

<input type="file" id="imageInput" accept=".png,.alm,.bin,.dat">
<button onclick="decode()">استعادة النص</button>

<div id="outputText"></div>

</div>

<script>
const B=32, LMAX=12, SIZE=1024, HEADER=16;

const indexToChar={
1:"ا",2:"ب",3:"ت",4:"ث",5:"ج",6:"ح",7:"خ",8:"د",9:"ذ",
10:"ر",11:"ز",12:"س",13:"ش",14:"ص",15:"ض",16:"ط",
17:"ظ",18:"ع",19:"غ",20:"ف",21:"ق",22:"ك",23:"ل",
24:"م",25:"ن",26:"ه",27:"و",28:"ي"
};

const charToIndex={};
for(let k in indexToChar) charToIndex[indexToChar[k]]=Number(k);

function normalizeArabic(s){
return s.replace(/[إأآ]/g,"ا")
.replace(/ى/g,"ي")
.replace(/ؤ/g,"و")
.replace(/ئ/g,"ي")
.replace(/ة/g,"ه");
}

function cleanText(t){
return t.split("").filter(c=>charToIndex[c]||c===" ")
.join("").replace(/\s+/g," ").trim();
}

function wordToCode(w){
const c=new Array(LMAX).fill(0);
let p=0;
for(let i=w.length-1;i>=0;i--){
const idx=charToIndex[w[i]];
if(idx===undefined) continue;
c[p++]=idx;
if(p>=LMAX) break;
}
let C=0n;
for(let i=0;i<LMAX;i++){
C+=BigInt(c[i])*(BigInt(B)**BigInt(i));
}
return C;
}

function codeToWord(C){
let out="";
for(let i=0;i<LMAX;i++){
const d=Number(C%BigInt(B));
C/=BigInt(B);
if(d) out=indexToChar[d]+out;
}
return out;
}

function splitWord(w){
const a=[];
for(let i=0;i<w.length;i+=LMAX){
a.push(w.slice(i,i+LMAX));
}
return a;
}

function drawPixel(ctx,p,g){
const x=p%SIZE;
const y=Math.floor(p/SIZE);
const img=ctx.createImageData(1,1);
img.data[0]=g;
img.data[1]=g;
img.data[2]=g;
img.data[3]=255;
ctx.putImageData(img,x,y);
}

// ================= ENCODE =================
function encode(){
let text=normalizeArabic(document.getElementById("inputText").value);
text=cleanText(text);

const key=BigInt(document.getElementById("userKey").value||0);

const words=text.split(" ");
const blocks=[];
words.forEach(w=>{
splitWord(w).forEach(b=>blocks.push(b));
});

const canvas=document.getElementById("canvas");
canvas.width=SIZE;
canvas.height=SIZE;
const ctx=canvas.getContext("2d");

ctx.fillStyle="white";
ctx.fillRect(0,0,SIZE,SIZE);

// عدد البلوكات
let count=BigInt(blocks.length);
for(let i=0;i<8;i++){
const v=Number((count>>BigInt(8*i))&0xFFn);
drawPixel(ctx,i,255-v);
}

// البيانات
blocks.forEach((b,bi)=>{
let C=wordToCode(b)^key;
for(let j=0;j<8;j++){
const byte=Number((C>>BigInt(8*j))&0xFFn);
const p=HEADER+bi*8+j;
drawPixel(ctx,p,255-byte);
}
});

alert("تم إنشاء الصورة بنجاح");
}

// ================= SAVE PNG =================
function saveImage(){
const canvas=document.getElementById("canvas");
const a=document.createElement("a");
a.href=canvas.toDataURL("image/png");
a.download="alm-v5.png";
a.click();
}

// ================= SAVE AS DOCUMENT =================
function saveAsDocument(){
const canvas=document.getElementById("canvas");

canvas.toBlob(function(blob){
  const file=new File([blob],"alm-v5.alm",{type:"application/octet-stream"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(file);
  a.download="alm-v5.alm";
  a.click();
},"image/png");
}

// ================= DECODE =================
function decode(){
const file=document.getElementById("imageInput").files[0];
if(!file) return;

const key=BigInt(document.getElementById("userKey").value||0);

const img=new Image();
img.onload=()=>{
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

canvas.width=img.width;
canvas.height=img.height;
ctx.drawImage(img,0,0);

const data=ctx.getImageData(0,0,canvas.width,canvas.height).data;

// قراءة العدد
let count=0n;
for(let i=0;i<8;i++){
const v=255-data[i*4];
count|=(BigInt(v)<<BigInt(8*i));
}

const blocks=[];
for(let bi=0;bi<Number(count);bi++){
let C=0n;
for(let j=0;j<8;j++){
const p=HEADER+bi*8+j;
const v=255-data[p*4];
C|=(BigInt(v)<<BigInt(8*j));
}
const w=codeToWord(C^key);
if(w) blocks.push(w);
}

document.getElementById("outputText").innerText=blocks.join(" ");
};

img.src=URL.createObjectURL(file);
}
</script>

</body>
</html>
